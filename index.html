<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Akriti ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Floating Hearts -->
<div id="hearts"></div>

<!-- Password Screen -->

<section id="passwordScreen">

<div class="glass">

<h1>❤️ For Akriti ❤️</h1>

<p>This little website is only for one person.</p>

<input
type="password"
id="password"
placeholder="Enter Password">

<button id="unlockBtn">

Unlock ❤️

</button>

<p id="wrong"></p>

</div>

</section>

<!-- Loading -->

<section id="loadingScreen" class="hidden">

<div class="loader"></div>

<h2>Unlocking My Heart...</h2>

</section>

<!-- Intro -->

<section id="intro" class="hidden">

<div class="glass introBox">

<h1>Hello Akriti ❤️</h1>

<p id="typing"></p>

<button id="continueBtn">

Continue ➜

</button>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
